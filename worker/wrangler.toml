name = "vault-bug-report"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Plain vars — safe to commit. Override per-environment if needed.
[vars]
GITHUB_OWNER = "steverowley"
GITHUB_REPO = "commander-deck-analyser"
# Comma-separated origins. Set this in production to lock CORS to your
# GitHub Pages domain (e.g. "https://steverowley.github.io"). Leave as
# "*" while developing.
ALLOWED_ORIGIN = "*"

# Secrets (set via `wrangler secret put GITHUB_TOKEN`):
#   GITHUB_TOKEN — fine-grained PAT, Issues: Read and write on the repo above.
