name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    name: Vitest (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  # E2E (Playwright) is intentionally not wired into CI yet — needs more
  # iteration to stabilise the browser-install + dev-server boot in the
  # GitHub Actions environment. The suite still runs locally:
  #   npm run e2e:install
  #   npm run e2e
  # Once stable, add an e2e job here with cached browser binaries.
